<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Tunnel Not Found | xflow</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in         { animation: fade-in 0.5s ease forwards; }
    .fade-in-delay-1 { animation: fade-in 0.5s ease 0.15s forwards; opacity: 0; }
    .fade-in-delay-2 { animation: fade-in 0.5s ease 0.3s forwards; opacity: 0; }
  </style>
</head>
<body class="bg-black text-white min-h-screen flex flex-col items-center justify-center px-6">

  <!-- Badge -->
  <div class="fade-in text-center mb-10">
    <div class="inline-flex items-center gap-2 mb-6">
      <div class="w-2 h-2 rounded-full bg-red-500"></div>
      <span class="text-xs tracking-widest uppercase text-zinc-500 font-medium">xflow tunnel</span>
    </div>

    <!-- 404 + message — gaya Next.js -->
    <div class="flex items-center justify-center gap-0">
      <span class="text-2xl font-semibold pr-6 border-r border-zinc-700 leading-none py-1">404</span>
      <div class="pl-6 text-left">
        <p class="text-sm font-normal leading-none">This tunnel is not available.</p>
      </div>
    </div>
  </div>

  <!-- Detail -->
  <div class="fade-in-delay-1 text-center max-w-xs">
    <p class="text-zinc-600 text-xs leading-relaxed">
      The tunnel
      <code id="tid" class="font-mono bg-zinc-900 border border-zinc-800 text-zinc-400 text-xs px-1.5 py-0.5 rounded mx-1"></code>
      has been closed or never existed.
      <br class="mb-1">
      The owner may have stopped their local server.
    </p>
  </div>

  <!-- Divider -->
  <div class="fade-in-delay-1 w-full max-w-xs border-t border-zinc-800 my-10"></div>

  <!-- Support -->
  <div class="fade-in-delay-2 text-center">
    <p class="text-zinc-600 text-xs uppercase tracking-widest mb-4">Like this project?</p>
    <a
      href="https://buymeacoffee.com"
      target="_blank"
      rel="noopener noreferrer"
      class="inline-flex items-center gap-2 bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 hover:border-zinc-600 text-white text-sm font-medium px-5 py-2.5 rounded-full transition-all duration-200"
    >
      <span>☕</span>
      <span>Buy me a coffee</span>
    </a>
    <p class="text-zinc-700 text-xs mt-4">Built with ❤️ using xflow</p>
  </div>

  <script>
    const parts = window.location.pathname.split('/').filter(Boolean);
    if (parts[0]) {
      document.getElementById('tid').textContent = parts[0];
    }
  </script>
</body>
</html>
